kind = "web"
previewPath = "/"
title = "Grafly Landing Page"
version = "1.0.0"
id = "artifacts/grafly-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25682

[services.development]
run = "pnpm --filter @workspace/grafly-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grafly-landing", "run", "build" ]
publicDir = "artifacts/grafly-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25682"
BASE_PATH = "/"
